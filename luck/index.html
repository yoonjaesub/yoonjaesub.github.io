<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {margin: 0; padding: 0;}
        body {display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; flex-direction: column;}
        table {width: 400px; height: 400px; border: 1px solid #333; background-color: black;}
        td {border: 1px solid #333; text-align: center; font-weight: bold; background-color: white;}
        #create_btn {width: 300px; height: 50px; margin-top: 100px; border: none; background-color: coral; color: white; font-weight: bold; font-size: 22px;}
        #create_btn:hover {background-color: rgb(250, 101, 46); cursor: pointer;}
        .on {background-color: #f6f990;}
        .stats-wrap{
            width: 400px;
            margin-top: 20px;   /* 테이블 아래 간격 */
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #fafafa;
            box-sizing: border-box;
        }
        .stats-title{
            font-size: 14px;
            font-weight: 800;
            color: #222;
            margin-bottom: 8px;
        }
        .stats-row{
            display: flex;
            gap: 12px;
        }
        .stats-box{
            flex: 1;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 12px;
            box-sizing: border-box;
        }
        .stats-box h4{
            font-size: 13px;
            margin-bottom: 8px;
            color: #333;
        }
        .stats-list{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .badge{
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 34px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #f1f1f1;
            font-weight: 800;
            font-size: 13px;
            color: #222;
        }
        .badge small{
            margin-left: 6px;
            font-weight: 700;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td id="1">1</td>
            <td id="2">2</td>
            <td id="3">3</td>
            <td id="4">4</td>
            <td id="5">5</td>
            <td id="6">6</td>
            <td id="7">7</td>
        </tr>
        <tr>
            <td id="8">8</td>
            <td id="9">9</td>
            <td id="10">10</td>
            <td id="11">11</td>
            <td id="12">12</td>
            <td id="13">13</td>
            <td id="14">14</td>
        </tr>
        <tr>
            <td id="15">15</td>
            <td id="16">16</td>
            <td id="17">17</td>
            <td id="18">18</td>
            <td id="19">19</td>
            <td id="20">20</td>
            <td id="21">21</td>
        </tr>
        <tr>
            <td id="22">22</td>
            <td id="23">23</td>
            <td id="24">24</td>
            <td id="25">25</td>
            <td id="26">26</td>
            <td id="27">27</td>
            <td id="28">28</td>
        </tr>
        <tr>
            <td id="29">29</td>
            <td id="30">30</td>
            <td id="31">31</td>
            <td id="32">32</td>
            <td id="33">33</td>
            <td id="34">34</td>
            <td id="35">35</td>
        </tr>
        <tr>
            <td id="36">36</td>
            <td id="37">37</td>
            <td id="38">38</td>
            <td id="39">39</td>
            <td id="40">40</td>
            <td id="41">41</td>
            <td id="42">42</td>
        </tr>
        <tr>
            <td id="43">43</td>
            <td id="44">44</td>
            <td id="45">45</td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>
    <div class="stats-wrap" id="statsWrap">
        <div class="stats-title">출현 빈도 TOP / BOTTOM</div>
        <div class="stats-row">
            <div class="stats-box">
                <h4>가장 많이 나온 번호</h4>
                <div class="stats-list" id="top6List"></div>
            </div>
            <div class="stats-box">
                <h4>가장 적게 나온 번호</h4>
                <div class="stats-list" id="bottom6List"></div>
            </div>
        </div>
    </div>
    <button type="button" id="create_btn" onclick="generateNumbers();">생 성</button>
    <p>835 ~ 1208회</p>
    <script>
    // 835회 부터 ~ 1208회 까지 당첨된 숫자들
    // 동행복권 시작일 2018.12 (835회)
    // 숫자의 빈도를 매핑하는 객체
    const numberFrequencies = {
        1: 53,        2: 54,        3: 70,        4: 56,        5: 46, 
        6: 67,        7: 66,        8: 45,        9: 54,        10: 47, 
        11: 55,       12: 64,       13: 61,       14: 58,       15: 57, 
        16: 65,       17: 60,       18: 59,       19: 57,       20: 55, 
        21: 58,       22: 60,       23: 55,       24: 63,       25: 44, 
        26: 63,       27: 59,       28: 65,       29: 56,       30: 65, 
        31: 58,       32: 63,       33: 65,       34: 59,       35: 65, 
        36: 59,       37: 62,       38: 70,       39: 57,       40: 55, 
        41: 48,       42: 54,       43: 47,       44: 57,       45: 62
    };

    function renderTopBottom5() {
        const entries = Object.entries(numberFrequencies)
            .map(([num, freq]) => ({ num: parseInt(num, 10), freq: parseInt(freq, 10) }));

        // 많이 나온 순(내림차순), 같으면 번호 오름차순
        const desc = [...entries].sort((a, b) => (b.freq - a.freq) || (a.num - b.num));
        // 적게 나온 순(오름차순), 같으면 번호 오름차순
        const asc  = [...entries].sort((a, b) => (a.freq - b.freq) || (a.num - b.num));

        const top5 = desc.slice(0, 6);
        const bottom5 = asc.slice(0, 6);

        const top5List = document.getElementById('top6List');
        const bottom5List = document.getElementById('bottom6List');

        top5List.innerHTML = top5.map(x => `<span class="badge">${x.num}</span>`).join('');
        bottom5List.innerHTML = bottom5.map(x => `<span class="badge">${x.num}</span>`).join('');
    }
    // 페이지 로드시 1회 렌더
    renderTopBottom5();

    // 각 숫자의 빈도에 따라 num_list 배열 생성
    let num_list = [];
    for (const number in numberFrequencies) {
        for (let i = 0; i < numberFrequencies[number]; i++) {
            num_list.push(parseInt(number));
        }
    }

    function generateNumbers() {
        const tds = document.querySelectorAll("td");
        tds.forEach(td => td.classList.remove("on")); // 이전 하이라이트 제거
        let selectedNumbers = [];

        while (selectedNumbers.length < 6) { // 6개의 유일한 숫자 확보
            const randomIndex = Math.floor(Math.random() * num_list.length);
            const number = num_list[randomIndex];
            if (!selectedNumbers.includes(number)) {
                selectedNumbers.push(number);
            }
        }

        addHighlight(selectedNumbers, 0);
    }

    function addHighlight(numbers, index) {
        if (index >= numbers.length) return; // 모든 숫자가 처리되면 종료

        const td = document.getElementById(numbers[index]);
        td.classList.add("on"); // 선택된 숫자 하이라이트

        setTimeout(() => {
            addHighlight(numbers, index + 1); // 0.5초 후 다음 숫자 처리
        }, 500);
    }
    </script>
</body>
</html>
